<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REKOM Safe Zone Checker</title>
<!-- Biblioteker hentet via CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">

<style>
    body { 
        background-color: #16322D; 
        color: #E6BD71; 
        margin: 0; 
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    .safe-zone-overlay {
        pointer-events: none;
        position: absolute;
        inset: 0;
        z-index: 10;
    }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #16322D; }
    ::-webkit-scrollbar-thumb { background: #E6BD71; border-radius: 10px; }

    .device-frame {
        box-shadow: 0 0 0 12px #0a1816, 0 30px 100px rgba(0,0,0,0.8);
        background: #000;
    }
</style>


</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useRef } = React;

    const Icon = ({ name, size = 16, className = "" }) => (
        <i className={`lucide-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>
    );

    function App() {
        const [file, setFile] = useState(null);
        const [fileType, setFileType] = useState(null);
        const [platform, setPlatform] = useState('meta'); 
        const [subFormat, setSubFormat] = useState('reels'); 
        const fileInputRef = useRef(null);

        const handleFile = (e) => {
            const uploadedFile = e.target.files?.[0] || e.dataTransfer?.files?.[0];
            if (!uploadedFile) return;
            setFileType(uploadedFile.type.startsWith('video') ? 'video' : 'image');
            setFile(URL.createObjectURL(uploadedFile));
        };

        const getSafeZones = () => {
            if (platform === 'tiktok') return { top: 5.6, bottom: 18, left: 6, right: 12, notch: false };
            if (platform === 'snapchat') return { top: 10, bottom: 35, left: 6, right: 6, notch: true, notchH: 12, notchW: 18 };
            if (subFormat === 'reels') return { top: 14, bottom: 25, left: 6, right: 6, notch: true, notchH: 6, notchW: 22 };
            return { top: 14, bottom: 20, left: 6, right: 6, notch: false };
        };

        const zones = getSafeZones();

        return (
            <div className="min-h-screen flex flex-col">
                
                {/* Header */}
                <header className="w-full py-12 flex flex-col items-center">
                    <img 
                        src="logo.png" 
                        alt="REKOM Logo" 
                        className="h-12 md:h-14 object-contain mb-6"
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                    <div className="w-24 h-0.5 bg-[#E6BD71]/20 rounded-full"></div>
                </header>

                {/* Main Content Area */}
                <main className="flex-grow flex flex-col lg:flex-row items-center lg:items-start justify-center gap-12 lg:gap-24 px-6 max-w-7xl mx-auto w-full pb-20">
                    
                    {/* Venstre Side: Preview */}
                    <div className="flex flex-col items-center w-full max-w-[380px] animate-fade-in" style={{ animationDelay: '0.1s' }}>
                        <h2 className="text-[10px] tracking-[0.6em] font-black mb-8 opacity-40 uppercase text-center w-full">
                            Forhåndsvisning
                        </h2>
                        
                        <div 
                            className={`relative w-full aspect-[9/16] rounded-[2.5rem] overflow-hidden transition-all duration-500 device-frame ${!file ? 'border-2 border-dashed border-[#E6BD71]/20 hover:bg-white/5 hover:border-[#E6BD71]/40 cursor-pointer' : ''}`}
                            onClick={() => !file && fileInputRef.current.click()}
                        >
                            {!file ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-12 text-center group">
                                    <div className="w-20 h-20 border border-[#E6BD71]/20 rounded-full flex items-center justify-center mb-8 transition-all group-hover:scale-110 group-hover:border-[#E6BD71]/60">
                                        <Icon name="upload" size={32} className="opacity-40" />
                                    </div>
                                    <p className="text-white font-bold text-2xl mb-2 tracking-tight">Upload medie</p>
                                    <p className="text-[#E6BD71]/40 text-[10px] font-bold uppercase tracking-[0.2em]">
                                        MP4, MOV, JPG, PNG
                                    </p>
                                </div>
                            ) : (
                                <>
                                    {fileType === 'video' ? (
                                        <video src={file} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                                    ) : (
                                        <img src={file} className="w-full h-full object-cover" alt="Preview" />
                                    )}

                                    {/* SVG Maskering */}
                                    <div className="safe-zone-overlay">
                                        <svg className="w-full h-full" viewBox="0 0 100 177.7" preserveAspectRatio="none">
                                            <defs>
                                                <mask id="sz-mask">
                                                    <rect width="100" height="177.7" fill="white" />
                                                    {/* Hullet (Safe Zone) */}
                                                    <rect 
                                                       x={zones.left} 
                                                       y={zones.top} 
                                                       width={100 - zones.left - zones.right}
                                                       height={177.7 - zones.top - (177.7 * zones.bottom / 100)}
                                                       fill="black" 
                                                    />
                                                    {/* Tilføj notch tilbage til masken (gør det guld igen) */}
                                                    {zones.notch && (
                                                        <rect 
                                                          x={100 - zones.notchW} 
                                                          y={177.7 - (177.7 * zones.bottom / 100) - zones.notchH} 
                                                          width={zones.notchW} 
                                                          height={zones.notchH} 
                                                          fill="white" 
                                                        />
                                                    )}
                                                </mask>
                                            </defs>
                                            <rect width="100" height="177.7" fill="#E6BD71" fillOpacity="0.45" mask="url(#sz-mask)" />
                                        </svg>
                                    </div>

                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setFile(null); }}
                                        className="absolute top-6 right-6 z-20 bg-black/60 backdrop-blur-xl p-2.5 rounded-full hover:bg-red-600 transition-all duration-300"
                                    >
                                        <Icon name="x" size={16} className="text-white" />
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Højre Side: Styringspanel */}
                    <div className="w-full max-w-[360px] flex flex-col gap-6 animate-fade-in" style={{ animationDelay: '0.2s' }}>
                        
                        <div className="bg-white/[0.03] border border-white/10 rounded-[2rem] p-8 shadow-sm">
                            <h3 className="text-[10px] tracking-[0.2em] font-black mb-4 flex items-center gap-3 uppercase opacity-30">
                                <Icon name="help-circle" size={14} /> Hvad er safe zone?
                            </h3>
                            <p className="text-[12px] opacity-70 leading-relaxed font-medium">
                                En safe zone er det område, hvor dit indhold sikkert kan ses uden at blive dækket af knapper, brugernavne eller captions.
                            </p>
                        </div>

                        <div className="bg-white/[0.03] border border-white/10 rounded-[2rem] p-8 shadow-sm">
                            <h3 className="text-[10px] tracking-[0.2em] font-black mb-6 flex items-center gap-3 uppercase opacity-30">
                                <Icon name="smartphone" size={14} /> Vælg Platform
                            </h3>
                            
                            <div className="grid grid-cols-3 gap-2 bg-black/40 p-1.5 rounded-2xl mb-6">
                                {['meta', 'tiktok', 'snapchat'].map((p) => (
                                    <button 
                                        key={p}
                                        onClick={() => setPlatform(p)}
                                        className={`py-3 rounded-xl font-bold text-[10px] transition-all duration-300 uppercase tracking-widest ${platform === p ? 'bg-[#E6BD71] text-[#16322D] shadow-lg' : 'opacity-30 hover:opacity-100'}`}
                                    >
                                        {p}
                                    </button>
                                ))}
                            </div>

                            {platform === 'meta' && (
                                <div className="flex gap-2 animate-fade-in">
                                    {['reels', 'stories'].map(sub => (
                                        <button 
                                            key={sub}
                                            onClick={() => setSubFormat(sub)}
                                            className={`flex-1 py-2.5 rounded-xl font-bold text-[9px] border transition-all duration-300 uppercase tracking-widest ${subFormat === sub ? 'border-[#E6BD71] text-[#E6BD71] bg-[#E6BD71]/10' : 'border-white/10 opacity-30 hover:opacity-100'}`}
                                        >
                                            {sub}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="bg-white/[0.03] border border-white/10 rounded-[2rem] p-8 shadow-sm">
                            <h3 className="text-[10px] tracking-[0.2em] font-black mb-5 flex items-center gap-3 uppercase opacity-30">
                                <Icon name="info" size={14} /> Sådan gør du
                            </h3>
                            <ul className="space-y-4">
                                {[
                                    "Upload dit medie (MP4, JPG, PNG).",
                                    "Vælg din ønskede platform.",
                                    "Hold vigtigt indhold i de klare områder.",
                                    "Undgå grafik i de gyldne zoner."
                                ].map((text, i) => (
                                    <li key={i} className="flex gap-4 items-start text-[11px] opacity-60 leading-snug">
                                        <span className="w-5 h-5 rounded-full border border-[#E6BD71]/20 flex items-center justify-center text-[9px] font-black shrink-0 mt-0.5">
                                            {i + 1}
                                        </span>
                                        {text}
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {file && (
                            <button
                                onClick={() => fileInputRef.current?.click()}
                                className="w-full py-6 rounded-[2rem] font-black flex items-center justify-center gap-4 bg-[#E6BD71] text-[#16322D] text-[12px] uppercase tracking-[0.2em] shadow-xl hover:brightness-110 active:scale-95 transition-all duration-300 animate-fade-in"
                            >
                                <Icon name="refresh-cw" size={18} />
                                Upload ny fil
                            </button>
                        )}
                    </div>
                </main>

                <footer className="w-full flex flex-col items-center gap-2 py-12 border-t border-white/5 mt-auto">
                    <p className="text-[12px] font-black tracking-[0.5em] uppercase opacity-100 text-center">
                        REKOM Safe Zone Checker
                    </p>
                    <p className="text-[9px] tracking-[0.2em] opacity-30 uppercase font-bold text-center">
                        Udviklet af Frederik Nielsen
                    </p>
                </footer>

                <input type="file" ref={fileInputRef} className="hidden" accept="image/*,video/*" onChange={handleFile} />
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


</body>
</html>
