<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REKOM Safe Zone Checker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
<style>
body {
background-color: #16322D;
color: #E6BD71;
margin: 0;
font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
-webkit-font-smoothing: antialiased;
}
.safe-zone-overlay {
pointer-events: none;
position: absolute;
inset: 0;
}
.animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #16322D; }
    ::-webkit-scrollbar-thumb { background: #E6BD71; border-radius: 10px; }
</style>


</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useRef } = React;

    const Icon = ({ name, size = 16, className = "" }) => (
        <i className={`lucide-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>
    );

    function App() {
        const [file, setFile] = useState(null);
        const [fileType, setFileType] = useState(null);
        const [platform, setPlatform] = useState('meta'); 
        const [subFormat, setSubFormat] = useState('reels'); 
        const fileInputRef = useRef(null);

        const handleFile = (e) => {
            const uploadedFile = e.target.files?.[0] || e.dataTransfer?.files?.[0];
            if (!uploadedFile) return;
            setFileType(uploadedFile.type.startsWith('video') ? 'video' : 'image');
            setFile(URL.createObjectURL(uploadedFile));
        };

        const getSafeZones = () => {
            if (platform === 'tiktok') return { top: '5.6%', bottom: '18%', left: '6%', right: '12%', notch: false };
            if (platform === 'snapchat') return { top: '10%', bottom: '35%', left: '6%', right: '6%', notch: true, notchH: '12%', notchW: '18%' };
            if (subFormat === 'reels') return { top: '14%', bottom: '25%', left: '6%', right: '6%', notch: true, notchH: '6%', notchW: '22%' };
            return { top: '14%', bottom: '20%', left: '6%', right: '6%', notch: false };
        };

        const zones = getSafeZones();

        return (
            <div className="min-h-screen flex flex-col items-center">
                
                {/* Centreret Logo */}
                <header className="w-full max-w-7xl px-8 pt-12 flex flex-col items-center">
                    <img 
                        src="logo.png" 
                        alt="REKOM Logo" 
                        className="h-12 md:h-16 object-contain mb-6"
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                    <div className="w-24 h-0.5 bg-[#E6BD71]/30 rounded-full"></div>
                </header>

                {/* Main Layout Container */}
                <main className="w-full max-w-7xl flex flex-col lg:flex-row items-center lg:items-start justify-center gap-12 lg:gap-24 px-8 py-12 flex-grow">
                    
                    {/* Venstre side: Den visuelle checker */}
                    <div className="flex flex-col items-center w-full max-w-[400px]">
                        <h2 className="text-[10px] tracking-[0.5em] font-bold mb-6 opacity-40 uppercase">
                            Forhåndsvisning
                        </h2>
                        
                        <div 
                            className={`relative w-full aspect-[9/16] rounded-[2.5rem] overflow-hidden transition-all duration-500 shadow-[0_30px_100px_rgba(0,0,0,0.6)] ${!file ? 'border-2 border-dashed border-[#E6BD71]/20 hover:bg-white/5 hover:border-[#E6BD71]/40 cursor-pointer' : 'bg-black'}`}
                            onClick={() => !file && fileInputRef.current.click()}
                        >
                            {!file ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-12 text-center group">
                                    <div className="w-20 h-20 border border-[#E6BD71]/30 rounded-full flex items-center justify-center mb-8 transition-all group-hover:scale-110 group-hover:bg-[#E6BD71]/5">
                                        <Icon name="upload" size={32} className="opacity-60" />
                                    </div>
                                    <p className="text-white font-bold text-2xl mb-2 tracking-tight">Upload medie</p>
                                    <p className="text-[#E6BD71]/50 text-[11px] font-bold uppercase tracking-widest">
                                        Træk fil eller klik
                                    </p>
                                </div>
                            ) : (
                                <>
                                    {fileType === 'video' ? (
                                        <video src={file} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                                    ) : (
                                        <img src={file} className="w-full h-full object-cover" alt="Preview" />
                                    )}

                                    {/* Det gyldne Safe Zone Overlay */}
                                    <div className="safe-zone-overlay">
                                        <svg className="w-full h-full" viewBox="0 0 100 177.7" preserveAspectRatio="none">
                                            <defs>
                                                <mask id="sz-mask">
                                                    <rect width="100" height="177.7" fill="white" />
                                                    {/* Hullet i midten (Safe Zone) */}
                                                    <rect 
                                                       x={parseFloat(zones.left)} 
                                                       y={parseFloat(zones.top)} 
                                                       width={100 - parseFloat(zones.left) - parseFloat(zones.right)}
                                                       height={177.7 - parseFloat(zones.top) - (177.7 * parseFloat(zones.bottom) / 100)}
                                                       fill="black" 
                                                    />
                                                </mask>
                                            </defs>
                                            <rect width="100" height="177.7" fill="#E6BD71" fillOpacity="0.45" mask="url(#sz-mask)" />
                                        </svg>
                                    </div>

                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setFile(null); }}
                                        className="absolute top-6 right-6 bg-black/50 backdrop-blur-xl p-2.5 rounded-full hover:bg-red-600 transition-all duration-300 group"
                                    >
                                        <Icon name="x" size={18} className="text-white group-hover:scale-110" />
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Højre side: Styringspanel */}
                    <div className="w-full max-w-[360px] flex flex-col gap-6 pt-0 lg:pt-10">
                        
                        {/* Platform-vælger boks */}
                        <div className="bg-white/[0.03] border border-white/10 rounded-[2rem] p-8 shadow-2xl">
                            <h3 className="text-[10px] tracking-[0.2em] font-black mb-6 flex items-center gap-3 uppercase opacity-40">
                                <Icon name="smartphone" size={14} /> Vælg Platform
                            </h3>
                            
                            <div className="grid grid-cols-3 gap-2 bg-black/30 p-1.5 rounded-2xl mb-6">
                                {['meta', 'tiktok', 'snapchat'].map((p) => (
                                    <button 
                                        key={p}
                                        onClick={() => setPlatform(p)}
                                        className={`py-3 rounded-xl font-bold text-[10px] transition-all duration-300 uppercase tracking-wider ${platform === p ? 'bg-[#E6BD71] text-[#16322D] shadow-lg scale-[1.02]' : 'opacity-40 hover:opacity-100 hover:bg-white/5'}`}
                                    >
                                        {p}
                                    </button>
                                ))}
                            </div>

                            {platform === 'meta' && (
                                <div className="flex gap-2 animate-fade-in">
                                    {['reels', 'stories'].map(sub => (
                                        <button 
                                            key={sub}
                                            onClick={() => setSubFormat(sub)}
                                            className={`flex-1 py-2.5 rounded-xl font-bold text-[9px] border transition-all duration-300 uppercase tracking-widest ${subFormat === sub ? 'border-[#E6BD71] text-[#E6BD71] bg-[#E6BD71]/10 shadow-[0_0_15px_rgba(230,189,113,0.1)]' : 'border-white/10 opacity-30 hover:opacity-100'}`}
                                        >
                                            {sub}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Info boks */}
                        <div className="bg-white/[0.03] border border-white/10 rounded-[2rem] p-8 shadow-2xl">
                            <h3 className="text-[10px] tracking-[0.2em] font-black mb-4 flex items-center gap-3 uppercase opacity-40">
                                <Icon name="help-circle" size={14} /> Guide
                            </h3>
                            <p className="text-[12px] opacity-70 leading-relaxed font-medium italic">
                                Hold dit budskab og dine vigtigste elementer (logo, tekst, CTA) i de klare områder for at sikre, at de ikke bliver dækket af platformens interface.
                            </p>
                        </div>

                        {file && (
                            <button
                                onClick={() => fileInputRef.current?.click()}
                                className="w-full py-6 rounded-[2rem] font-black flex items-center justify-center gap-4 bg-[#E6BD71] text-[#16322D] text-[12px] uppercase tracking-[0.2em] shadow-2xl hover:brightness-110 hover:-translate-y-1 active:scale-95 transition-all duration-300 animate-fade-in"
                            >
                                <Icon name="refresh-cw" size={18} />
                                Upload nyt medie
                            </button>
                        )}
                    </div>
                </main>

                {/* Footer */}
                <footer className="w-full flex flex-col items-center gap-2 py-12 border-t border-white/5 mt-12">
                    <p className="text-[14px] font-black tracking-[0.6em] uppercase opacity-100">
                        REKOM Safe Zone Checker
                    </p>
                    <p className="text-[10px] tracking-[0.3em] opacity-40 uppercase font-bold">
                        Udviklet af Frederik Nielsen
                    </p>
                </footer>

                <input type="file" ref={fileInputRef} className="hidden" accept="image/*,video/*" onChange={handleFile} />
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


</body>
</html>
