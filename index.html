<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REKOM Safe Zone Checker</title>
<!-- Biblioteker hentet via CDN for at sikre, at alt virker i én samlet fil -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">

<style>
    body { 
        background-color: #16322D; 
        color: #E6BD71; 
        margin: 0; 
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        overflow-x: hidden;
    }
    .animate-fade-in { 
        animation: fadeIn 0.4s ease-out forwards; 
    }
    @keyframes fadeIn { 
        from { opacity: 0; transform: translateY(10px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #16322D; }
    ::-webkit-scrollbar-thumb { background: #E6BD71; border-radius: 10px; }
    
    .transition-all { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
</style>


</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useRef } = React;

    // Ikon-hjælper til Lucide fonts
    const Icon = ({ name, size = 16, className = "" }) => (
        <i className={`lucide-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>
    );

    function App() {
        const [file, setFile] = useState(null);
        const [fileType, setFileType] = useState(null);
        const [platform, setPlatform] = useState('meta'); 
        const [subFormat, setSubFormat] = useState('reels'); 
        const fileInputRef = useRef(null);

        const handleFile = (e) => {
            const uploadedFile = e.target.files?.[0] || e.dataTransfer?.files?.[0];
            if (!uploadedFile) return;
            setFileType(uploadedFile.type.startsWith('video') ? 'video' : 'image');
            setFile(URL.createObjectURL(uploadedFile));
        };

        const getSafeZones = () => {
            if (platform === 'tiktok') {
                return { top: '5.6%', bottom: '16.7%', left: '5.5%', right: '11.1%', notch: false };
            }
            if (platform === 'snapchat') {
                return { top: '10%', bottom: '35%', left: '6%', right: '6%', notch: true, notchH: '10%', notchW: '15%' };
            }
            // Meta platform (Reels/Stories)
            if (subFormat === 'reels') {
                return { top: '14%', bottom: '25%', left: '6%', right: '6%', notch: true, notchH: '5%', notchW: '21%' };
            }
            // Meta Stories
            return { top: '14%', bottom: '20%', left: '6%', right: '6%', notch: false };
        };

        const zones = getSafeZones();

        return (
            <div className="min-h-screen flex flex-col items-center justify-between p-4 md:p-8">
                
                {/* Header - Logo */}
                <header className="w-full flex flex-col items-center pt-4 mb-4">
                    <img 
                        src="logo.png" 
                        alt="REKOM Logo" 
                        className="h-14 object-contain mb-4"
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                    <div className="w-20 h-0.5 bg-[#E6BD71]/40 rounded-full"></div>
                </header>

                {/* Main Content */}
                <main className="flex flex-col lg:flex-row items-center justify-center gap-16 lg:gap-24 w-full max-w-7xl flex-grow py-8 text-center lg:text-left">
                    
                    {/* Forhåndsvisning */}
                    <div className="flex flex-col items-center flex-1">
                        <h2 className="text-[10px] tracking-[0.4em] font-bold mb-4 opacity-50 uppercase w-full">
                            Forhåndsvisning
                        </h2>
                        <div 
                            className={`relative w-full h-[72vh] max-w-[380px] aspect-[9/16] rounded-[2.5rem] overflow-hidden transition-all duration-300 shadow-[0_0_60px_rgba(0,0,0,0.5)] ${!file ? 'border-2 border-dashed border-[#E6BD71]/20 hover:bg-white/5 hover:border-[#E6BD71]/40 cursor-pointer' : 'bg-black'}`}
                            onClick={() => !file && fileInputRef.current.click()}
                        >
                            {!file ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-12 text-center group">
                                    <div className="w-20 h-20 border border-[#E6BD71]/30 rounded-full flex items-center justify-center mb-8 transition-transform duration-300 group-hover:scale-110">
                                        <Icon name="upload" size={32} className="opacity-60" />
                                    </div>
                                    <p className="text-white font-bold text-2xl mb-3">Upload dit indhold</p>
                                    <p className="text-[#E6BD71]/60 text-sm font-medium leading-relaxed uppercase tracking-wider text-center">
                                        Træk fil herover eller klik<br/>(MP4, MOV, JPG, PNG)
                                    </p>
                                </div>
                            ) : (
                                <>
                                    {fileType === 'video' ? (
                                        <video src={file} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                                    ) : (
                                        <img src={file} className="w-full h-full object-cover" alt="Preview" />
                                    )}

                                    {/* Det gyldne Safe Zone Overlay */}
                                    <div className="absolute inset-0 pointer-events-none">
                                        <svg className="w-full h-full" style={{ fill: '#E6BD71', opacity: 0.4 }}>
                                            <mask id="safe-zone-mask">
                                                <rect width="100%" height="100%" fill="white" />
                                                <rect 
                                                   x={zones.left} 
                                                   y={zones.top} 
                                                   width={`calc(100% - ${zones.left} - ${zones.right})`}
                                                   height={`calc(100% - ${zones.top} - ${zones.bottom})`}
                                                   fill="black" 
                                                />
                                                {zones.notch && (
                                                    <rect 
                                                      x={`calc(100% - ${zones.notchW})`} 
                                                      y={`calc(100% - ${zones.bottom} - ${zones.notchH})`} 
                                                      width={zones.notchW} 
                                                      height={zones.notchH} 
                                                      fill="white" 
                                                    />
                                                )}
                                            </mask>
                                            <rect width="100%" height="100%" mask="url(#safe-zone-mask)" />
                                        </svg>
                                    </div>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setFile(null); }}
                                        className="absolute top-6 right-6 bg-black/40 backdrop-blur-md p-2 rounded-full hover:bg-red-600 transition-all duration-200"
                                    >
                                        <Icon name="x" size={18} className="text-white" />
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Sidebar */}
                    <div className="w-full max-w-[350px] flex flex-col gap-4 text-left">
                        
                        <div className="bg-white/5 border border-[#E6BD71]/10 rounded-2xl p-6 shadow-sm transition-all hover:border-[#E6BD71]/20">
                            <h3 className="text-[10px] tracking-[0.2em] font-bold mb-4 flex items-center gap-2 uppercase opacity-60">
                                <Icon name="help-circle" size={14} /> Hvad er safe zone?
                            </h3>
                            <p className="text-[11px] opacity-80 leading-relaxed font-medium">
                                En safe zone på Meta, Snapchat og TikTok er det område i dit annonceformat (fx 9:16), hvor tekst og vigtige elementer sikkert kan placeres uden at blive dækket af UI-elementer som brugernavn, CTA-knapper, likes eller captions.
                            </p>
                        </div>

                        <div className="bg-white/5 border border-[#E6BD71]/10 rounded-2xl p-6 shadow-sm">
                            <h3 className="text-[10px] tracking-[0.2em] font-bold mb-5 flex items-center gap-2 uppercase opacity-60">
                                <Icon name="smartphone" size={14} /> Vælg Platform
                            </h3>
                            <div className="flex bg-black/20 rounded-xl p-1 mb-4">
                                {['meta', 'tiktok', 'snapchat'].map((p) => (
                                    <button 
                                        key={p}
                                        onClick={() => setPlatform(p)}
                                        className={`flex-1 py-2.5 rounded-lg font-bold text-[10px] transition-all uppercase ${platform === p ? 'bg-[#E6BD71] text-[#16322D] hover:brightness-110' : 'opacity-40 hover:opacity-100 hover:bg-[#E6BD71]/10'}`}
                                    >
                                        {p}
                                    </button>
                                ))}
                            </div>
                            {platform === 'meta' && (
                                <div className="flex bg-white/5 rounded-lg p-1 border border-white/5 animate-fade-in">
                                    <button 
                                        onClick={() => setSubFormat('reels')}
                                        className={`flex-1 py-2 rounded-md font-bold text-[9px] transition-all ${subFormat === 'reels' ? 'bg-[#E6BD71]/20 text-[#E6BD71] hover:bg-[#E6BD71]/30' : 'opacity-30 hover:opacity-100 hover:bg-white/5'}`}
                                    >
                                        REELS
                                    </button>
                                    <button 
                                        onClick={() => setSubFormat('stories')}
                                        className={`flex-1 py-2 rounded-md font-bold text-[9px] transition-all ${subFormat === 'stories' ? 'bg-[#E6BD71]/20 text-[#E6BD71] hover:bg-[#E6BD71]/30' : 'opacity-30 hover:opacity-100 hover:bg-white/5'}`}
                                    >
                                        STORIES
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="bg-white/5 border border-[#E6BD71]/10 rounded-2xl p-6 shadow-sm transition-all hover:border-[#E6BD71]/20">
                            <h3 className="text-[10px] tracking-[0.2em] font-bold mb-5 flex items-center gap-2 uppercase opacity-60">
                                <Icon name="info" size={14} /> Sådan gør du
                            </h3>
                            <ul className="space-y-4">
                                {[
                                    "Upload dit indhold (MP4, MOV, JPG, PNG).",
                                    "Vælg format for at se de specifikke safe zones.",
                                    "Tjek hvilke områder der markeres med guld.",
                                    "Hold dine vigtigste elementer inden for safe zone."
                                ].map((text, i) => (
                                    <li key={i} className="flex gap-4 items-center text-[11px] opacity-70 leading-tight">
                                        <span className="w-5 h-5 rounded-full border border-[#E6BD71]/20 flex items-center justify-center text-[9px] font-bold shrink-0">
                                            {i + 1}
                                        </span>
                                        {text}
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {file && (
                            <button
                                onClick={() => fileInputRef.current?.click()}
                                className="w-full py-5 rounded-2xl font-bold flex items-center justify-center gap-3 bg-[#E6BD71] text-[#16322D] text-sm uppercase tracking-[0.2em] shadow-lg hover:brightness-110 active:scale-95 transition-all animate-fade-in"
                            >
                                <Icon name="upload" size={20} />
                                Upload nyt indhold
                            </button>
                        )}
                    </div>
                </main>

                <footer className="w-full flex flex-col items-center gap-1.5 pb-12 pt-8 border-t border-[#E6BD71]/10 mt-8 text-center">
                    <p className="text-[13px] font-bold tracking-[0.5em] uppercase opacity-100 text-white">
                        REKOM Safe Zone Checker
                    </p>
                    <p className="text-[11px] tracking-[0.2em] opacity-70 uppercase font-semibold">
                        Udviklet af: Frederik Nielsen
                    </p>
                </footer>

                <input 
                    type="file" 
                    ref={fileInputRef} 
                    className="hidden" 
                    accept="image/*,video/*" 
                    onChange={handleFile} 
                />
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


</body>
</html>
