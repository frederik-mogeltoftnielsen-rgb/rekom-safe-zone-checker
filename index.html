<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REKOM Safe Zone Checker</title>
<!-- Biblioteker hentet via CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">

<style>
    body { 
        background-color: #16322D; 
        color: #E6BD71; 
        margin: 0; 
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    .safe-zone-overlay {
        pointer-events: none;
        position: absolute;
        inset: 0;
        z-index: 10;
    }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #16322D; }
    ::-webkit-scrollbar-thumb { background: #E6BD71; border-radius: 10px; }

    .device-frame {
        box-shadow: 0 0 0 12px #0a1816, 0 40px 120px rgba(0,0,0,0.9);
        background: #000;
    }
    
    .glass-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(230, 189, 113, 0.15);
        backdrop-filter: blur(10px);
    }
</style>


</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useRef } = React;

    const Icon = ({ name, size = 16, className = "" }) => (
        <i className={`lucide-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>
    );

    function App() {
        const [file, setFile] = useState(null);
        const [fileType, setFileType] = useState(null);
        const [platform, setPlatform] = useState('meta'); 
        const [subFormat, setSubFormat] = useState('reels'); 
        const fileInputRef = useRef(null);

        const handleFile = (e) => {
            const uploadedFile = e.target.files?.[0] || e.dataTransfer?.files?.[0];
            if (!uploadedFile) return;
            setFileType(uploadedFile.type.startsWith('video') ? 'video' : 'image');
            setFile(URL.createObjectURL(uploadedFile));
        };

        const getSafeZones = () => {
            if (platform === 'tiktok') return { top: 5.6, bottom: 18, left: 6, right: 12, notch: false };
            if (platform === 'snapchat') return { top: 10, bottom: 35, left: 6, right: 6, notch: true, notchH: 12, notchW: 18 };
            if (subFormat === 'reels') return { top: 14, bottom: 25, left: 6, right: 6, notch: true, notchH: 6, notchW: 22 };
            return { top: 14, bottom: 20, left: 6, right: 6, notch: false };
        };

        const zones = getSafeZones();

        return (
            <div className="min-h-screen flex flex-col items-center">
                
                {/* Header med Tykkere Streg */}
                <header className="w-full py-14 flex flex-col items-center">
                    <img 
                        src="logo.png" 
                        alt="REKOM Logo" 
                        className="h-12 md:h-16 object-contain mb-6"
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                    <div className="w-28 h-1.5 bg-[#E6BD71] rounded-full shadow-[0_0_15px_rgba(230,189,113,0.3)]"></div>
                </header>

                {/* Main Container */}
                <main className="flex-grow flex flex-col lg:flex-row items-center lg:items-start justify-center gap-12 lg:gap-24 px-6 max-w-7xl mx-auto w-full pb-20 mt-4">
                    
                    {/* Preview Område */}
                    <div className="flex flex-col items-center w-full max-w-[390px] animate-fade-in" style={{ animationDelay: '0.1s' }}>
                        <h2 className="text-[11px] tracking-[0.7em] font-black mb-10 opacity-50 uppercase text-center w-full">
                            Forhåndsvisning
                        </h2>
                        
                        <div 
                            className={`relative w-full aspect-[9/16] rounded-[2.5rem] overflow-hidden transition-all duration-500 device-frame ${!file ? 'border-2 border-dashed border-[#E6BD71]/30 hover:bg-white/5 cursor-pointer' : ''}`}
                            onClick={() => !file && fileInputRef.current.click()}
                        >
                            {!file ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-12 text-center group">
                                    <div className="w-24 h-24 border-2 border-[#E6BD71]/20 rounded-full flex items-center justify-center mb-10 transition-all group-hover:scale-110 group-hover:border-[#E6BD71]/70 group-hover:bg-[#E6BD71]/5">
                                        <Icon name="upload" size={36} className="text-[#E6BD71]" />
                                    </div>
                                    <p className="text-white font-black text-2xl mb-3 tracking-tight">Upload medie</p>
                                    <p className="text-[#E6BD71]/40 text-[11px] font-bold uppercase tracking-[0.3em]">
                                        MP4, MOV, JPG, PNG
                                    </p>
                                </div>
                            ) : (
                                <>
                                    {fileType === 'video' ? (
                                        <video src={file} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                                    ) : (
                                        <img src={file} className="w-full h-full object-cover" alt="Preview" />
                                    )}

                                    <div className="safe-zone-overlay">
                                        <svg className="w-full h-full" viewBox="0 0 100 177.7" preserveAspectRatio="none">
                                            <defs>
                                                <mask id="sz-mask">
                                                    <rect width="100" height="177.7" fill="white" />
                                                    <rect 
                                                       x={zones.left} 
                                                       y={zones.top} 
                                                       width={100 - zones.left - zones.right}
                                                       height={177.7 - zones.top - (177.7 * zones.bottom / 100)}
                                                       fill="black" 
                                                    />
                                                    {zones.notch && (
                                                        <rect 
                                                          x={100 - zones.notchW} 
                                                          y={177.7 - (177.7 * zones.bottom / 100) - zones.notchH} 
                                                          width={zones.notchW} 
                                                          height={zones.notchH} 
                                                          fill="white" 
                                                        />
                                                    )}
                                                </mask>
                                            </defs>
                                            <rect width="100" height="177.7" fill="#E6BD71" fillOpacity="0.45" mask="url(#sz-mask)" />
                                        </svg>
                                    </div>

                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setFile(null); }}
                                        className="absolute top-8 right-8 z-30 bg-black/70 backdrop-blur-2xl p-3 rounded-full hover:bg-red-600 transition-all duration-300 shadow-xl"
                                    >
                                        <Icon name="x" size={18} className="text-white" />
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Styringspanel */}
                    <div className="w-full max-w-[370px] flex flex-col gap-8 animate-fade-in" style={{ animationDelay: '0.2s' }}>
                        
                        {/* Hvad er safe zone? */}
                        <div className="glass-card rounded-[2.5rem] p-9 shadow-xl">
                            <h3 className="text-2xl font-black mb-5 flex items-center gap-4 text-[#E6BD71]">
                                <Icon name="help-circle" size={24} /> Hvad er safe zone?
                            </h3>
                            <p className="text-[13px] text-white/70 leading-relaxed font-medium">
                                En safe zone er det kritiske område, hvor dit vigtigste indhold sikkert kan ses uden at blive dækket af platformens interface-elementer.
                            </p>
                        </div>

                        {/* Vælg Platform */}
                        <div className="glass-card rounded-[2.5rem] p-9 shadow-xl">
                            <h3 className="text-2xl font-black mb-8 flex items-center gap-4 text-[#E6BD71]">
                                <Icon name="smartphone" size={24} /> Vælg Platform
                            </h3>
                            
                            <div className="grid grid-cols-3 gap-2.5 bg-black/40 p-2 rounded-2xl mb-8">
                                {['meta', 'tiktok', 'snapchat'].map((p) => (
                                    <button 
                                        key={p}
                                        onClick={() => setPlatform(p)}
                                        className={`py-3.5 rounded-xl font-black text-[11px] transition-all duration-300 uppercase tracking-widest ${platform === p ? 'bg-[#E6BD71] text-[#16322D] shadow-xl scale-[1.03]' : 'opacity-40 hover:opacity-100'}`}
                                    >
                                        {p}
                                    </button>
                                ))}
                            </div>

                            {platform === 'meta' && (
                                <div className="flex gap-3 animate-fade-in">
                                    {['reels', 'stories'].map(sub => (
                                        <button 
                                            key={sub}
                                            onClick={() => setSubFormat(sub)}
                                            className={`flex-1 py-3 rounded-xl font-bold text-[10px] border-2 transition-all duration-300 uppercase tracking-widest ${subFormat === sub ? 'border-[#E6BD71] text-[#E6BD71] bg-[#E6BD71]/10 shadow-[0_0_20px_rgba(230,189,113,0.15)]' : 'border-white/5 opacity-30 hover:opacity-100 hover:border-white/20'}`}
                                        >
                                            {sub}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Sådan gør du */}
                        <div className="glass-card rounded-[2.5rem] p-9 shadow-xl">
                            <h3 className="text-2xl font-black mb-6 flex items-center gap-4 text-[#E6BD71]">
                                <Icon name="info" size={24} /> Sådan gør du
                            </h3>
                            <ul className="space-y-5">
                                {[
                                    "Upload dit medie (MP4, JPG, PNG).",
                                    "Vælg din ønskede platform.",
                                    "Hold vigtigt indhold i de klare områder.",
                                    "Undgå grafik i de gyldne zoner."
                                ].map((text, i) => (
                                    <li key={i} className="flex gap-5 items-start text-[12px] text-white/60 leading-snug">
                                        <span className="w-6 h-6 rounded-full border-2 border-[#E6BD71]/30 flex items-center justify-center text-[10px] font-black shrink-0 text-[#E6BD71] mt-0.5">
                                            {i + 1}
                                        </span>
                                        {text}
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {file && (
                            <button
                                onClick={() => fileInputRef.current?.click()}
                                className="w-full py-7 rounded-[2.5rem] font-black flex items-center justify-center gap-5 bg-[#E6BD71] text-[#16322D] text-[13px] uppercase tracking-[0.3em] shadow-[0_20px_50px_rgba(230,189,113,0.2)] hover:brightness-110 hover:-translate-y-1 active:scale-95 transition-all duration-300 animate-fade-in"
                            >
                                <Icon name="refresh-cw" size={22} />
                                Upload ny fil
                            </button>
                        )}
                    </div>
                </main>

                {/* Footer - Tydeligere tekst */}
                <footer className="w-full flex flex-col items-center gap-3 py-16 border-t border-white/5 mt-auto bg-black/20">
                    <p className="text-[14px] font-black tracking-[0.6em] uppercase text-[#E6BD71]">
                        REKOM Safe Zone Checker
                    </p>
                    <p className="text-[12px] tracking-[0.2em] font-bold text-white uppercase opacity-100">
                        Udviklet af: Frederik Nielsen
                    </p>
                </footer>

                <input type="file" ref={fileInputRef} className="hidden" accept="image/*,video/*" onChange={handleFile} />
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


</body>
</html>
