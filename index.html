<!DOCTYPE html>

<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REKOM Safe Zone Checker</title>
<!-- Biblioteker hentet via CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Font: Josefin Sans -->

<link href="https://www.google.com/search?q=https://fonts.googleapis.com/css2%3Ffamily%3DJosefin%2BSans:wght%40300%3B400%3B500%3B600%3B700%26display%3Dswap" rel="stylesheet">

<style>
body {
background-color: #16322D;
color: #E6BD71;
margin: 0;
font-family: 'Josefin Sans', ui-sans-serif, system-ui, sans-serif;
-webkit-font-smoothing: antialiased;
}
.safe-zone-overlay {
pointer-events: none;
position: absolute;
inset: 0;
z-index: 10;
}
.animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #16322D; }
::-webkit-scrollbar-thumb { background: #E6BD71; border-radius: 10px; }

.device-frame {
    box-shadow: 0 0 0 12px #0a1816, 0 40px 120px rgba(0,0,0,0.9);
    background: #1a3a35;
}

.glass-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(230, 189, 113, 0.15);
    backdrop-filter: blur(10px);
}

.format-warning {
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.4);
    color: #ff8a8a;
}


</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// Indbyggede SVG-ikoner
const icons = {
    upload: &lt;path d=&quot;M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12&quot;/&gt;,
    &#39;help-circle&#39;: &lt;g&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/&gt;&lt;path d=&quot;M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01&quot;/&gt;&lt;/g&gt;,
    smartphone: &lt;g&gt;&lt;rect width=&quot;14&quot; height=&quot;20&quot; x=&quot;5&quot; y=&quot;2&quot; rx=&quot;2&quot; ry=&quot;2&quot;/&gt;&lt;path d=&quot;M12 18h.01&quot;/&gt;&lt;/g&gt;,
    info: &lt;g&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/&gt;&lt;path d=&quot;M12 16v-4M12 8h.01&quot;/&gt;&lt;/g&gt;,
    x: &lt;path d=&quot;M18 6 6 18M6 6l12 12&quot;/&gt;,
    &#39;refresh-cw&#39;: &lt;path d=&quot;M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5&quot;/&gt;,
    &#39;alert-triangle&#39;: &lt;path d=&quot;m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z M12 9v4 M12 17h.01&quot;/&gt;,
    &#39;check-circle&#39;: &lt;path d=&quot;M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4 12 14.01l-3-3&quot;/&gt;
};

const Icon = ({ name, size = 16, className = &quot;&quot; }) =&gt; (
    &lt;svg 
        xmlns=&quot;http://www.w3.org/2000/svg&quot; 
        width={size} 
        height={size} 
        viewBox=&quot;0 0 24 24&quot; 
        fill=&quot;none&quot; 
        stroke=&quot;currentColor&quot; 
        strokeWidth=&quot;2&quot; 
        strokeLinecap=&quot;round&quot; 
        strokeLinejoin=&quot;round&quot; 
        className={className}
    &gt;
        {icons[name] || null}
    &lt;/svg&gt;
);

function App() {
    const [file, setFile] = useState(null);
    const [fileType, setFileType] = useState(null);
    const [platform, setPlatform] = useState(&#39;meta&#39;); 
    const [subFormat, setSubFormat] = useState(&#39;reels&#39;); 
    const [is916, setIs916] = useState(true);
    const fileInputRef = useRef(null);

    const handleFile = (e) =&gt; {
        const uploadedFile = e.target.files?.[0] || e.dataTransfer?.files?.[0];
        if (!uploadedFile) return;
        
        const type = uploadedFile.type.startsWith(&#39;video&#39;) ? &#39;video&#39; : &#39;image&#39;;
        setFileType(type);
        const url = URL.createObjectURL(uploadedFile);
        setFile(url);

        // Tjek format (9:16)
        if (type === &#39;image&#39;) {
            const img = new Image();
            img.onload = () =&gt; {
                const ratio = img.width / img.height;
                setIs916(Math.abs(ratio - 0.5625) &lt; 0.05);
            };
            img.src = url;
        } else {
            const video = document.createElement(&#39;video&#39;);
            video.onloadedmetadata = () =&gt; {
                const ratio = video.videoWidth / video.videoHeight;
                setIs916(Math.abs(ratio - 0.5625) &lt; 0.05);
            };
            video.src = url;
        }
    };

    const getSafeZones = () =&gt; {
        if (platform === &#39;tiktok&#39;) return { top: 5.6, bottom: 18, left: 6, right: 12, notch: false };
        if (platform === &#39;snapchat&#39;) return { top: 10, bottom: 35, left: 6, right: 6, notch: true, notchH: 12, notchW: 18 };
        if (subFormat === &#39;reels&#39;) return { top: 14, bottom: 25, left: 6, right: 6, notch: true, notchH: 6, notchW: 22 };
        return { top: 14, bottom: 20, left: 6, right: 6, notch: false };
    };

    const zones = getSafeZones();

    return (
        &lt;div className=&quot;min-h-screen flex flex-col items-center&quot;&gt;
            
            {/* Header */}
            &lt;header className=&quot;w-full py-14 flex flex-col items-center&quot;&gt;
                &lt;img 
                    src=&quot;logo.png&quot; 
                    alt=&quot;REKOM Logo&quot; 
                    className=&quot;h-12 md:h-16 object-contain mb-6&quot;
                    onError={(e) =&gt; { e.target.style.display = &#39;none&#39;; }}
                /&gt;
                &lt;div className=&quot;w-40 h-1 bg-[#E6BD71] rounded-full shadow-[0_0_15px_rgba(230,189,113,0.3)]&quot;&gt;&lt;/div&gt;
            &lt;/header&gt;

            {/* Main Container */}
            &lt;main className=&quot;flex-grow flex flex-col lg:flex-row items-center lg:items-start justify-center gap-12 lg:gap-16 px-6 max-w-7xl mx-auto w-full pb-20 mt-4&quot;&gt;
                
                {/* Preview Område */}
                &lt;div className=&quot;flex flex-col items-center w-full max-w-[360px] animate-fade-in&quot; style={{ animationDelay: &#39;0.1s&#39; }}&gt;
                    &lt;h2 className=&quot;text-[11px] tracking-[0.7em] font-black mb-10 opacity-50 uppercase text-center w-full&quot;&gt;
                        Forhåndsvisning
                    &lt;/h2&gt;
                    
                    &lt;div 
                        className={`relative w-full aspect-[9/16] rounded-[2.5rem] overflow-hidden transition-all duration-500 device-frame ${!file ? &#39;border-2 border-dashed border-[#E6BD71]/40 hover:bg-[#1e423d] cursor-pointer&#39; : &#39;bg-black&#39;}`}
                        onClick={() =&gt; !file &amp;&amp; fileInputRef.current.click()}
                    &gt;
                        {!file ? (
                            &lt;div className=&quot;absolute inset-0 flex flex-col items-center justify-center p-12 text-center group&quot;&gt;
                                &lt;div className=&quot;w-24 h-24 border-2 border-[#E6BD71]/40 rounded-full flex items-center justify-center mb-10 transition-all group-hover:scale-110 group-hover:border-[#E6BD71]/80 group-hover:bg-[#E6BD71]/10&quot;&gt;
                                    &lt;Icon name=&quot;upload&quot; size={36} className=&quot;text-[#E6BD71]&quot; /&gt;
                                &lt;/div&gt;
                                &lt;p className=&quot;text-white font-black text-2xl mb-3 tracking-tight text-center uppercase&quot;&gt;Upload indhold&lt;/p&gt;
                                &lt;p className=&quot;text-[#E6BD71]/80 text-[11px] font-bold uppercase tracking-[0.3em] max-w-[200px] text-center&quot;&gt;
                                    Træk fil herover eller klik for at vælge
                                &lt;/p&gt;
                            &lt;/div&gt;
                        ) : (
                            &lt;&gt;
                                {fileType === &#39;video&#39; ? (
                                    &lt;video src={file} autoPlay loop muted playsInline className=&quot;w-full h-full object-cover&quot; /&gt;
                                ) : (
                                    &lt;img src={file} className=&quot;w-full h-full object-cover&quot; alt=&quot;Preview&quot; /&gt;
                                )}

                                &lt;div className=&quot;safe-zone-overlay&quot;&gt;
                                    &lt;svg className=&quot;w-full h-full&quot; viewBox=&quot;0 0 100 177.7&quot; preserveAspectRatio=&quot;none&quot;&gt;
                                        &lt;defs&gt;
                                            &lt;mask id=&quot;sz-mask&quot;&gt;
                                                &lt;rect width=&quot;100&quot; height=&quot;177.7&quot; fill=&quot;white&quot; /&gt;
                                                &lt;rect 
                                                   x={zones.left} 
                                                   y={zones.top} 
                                                   width={100 - zones.left - zones.right}
                                                   height={177.7 - zones.top - (177.7 * zones.bottom / 100)}
                                                   fill=&quot;black&quot; 
                                                /&gt;
                                                {zones.notch &amp;&amp; (
                                                    &lt;rect 
                                                      x={100 - zones.notchW} 
                                                      y={177.7 - (177.7 * zones.bottom / 100) - zones.notchH} 
                                                      width={zones.notchW} 
                                                      height={zones.notchH} 
                                                      fill=&quot;white&quot; 
                                                    /&gt;
                                                )}
                                            &lt;/mask&gt;
                                        &lt;/defs&gt;
                                        &lt;rect width=&quot;100&quot; height=&quot;177.7&quot; fill=&quot;#E6BD71&quot; fillOpacity=&quot;0.45&quot; mask=&quot;url(#sz-mask)&quot; /&gt;
                                    &lt;/svg&gt;
                                &lt;/div&gt;
                            &lt;/&gt;
                        )}
                    &lt;/div&gt;

                    {/* Format Status Indikator */}
                    {file &amp;&amp; (
                        &lt;div className={`mt-6 w-full flex items-center justify-center gap-3 px-6 py-3 rounded-2xl animate-fade-in ${is916 ? &#39;bg-green-500/10 border border-green-500/20 text-green-400&#39; : &#39;format-warning&#39;}`}&gt;
                            &lt;Icon name={is916 ? &#39;check-circle&#39; : &#39;alert-triangle&#39;} size={18} /&gt;
                            &lt;span className=&quot;text-[11px] font-bold uppercase tracking-widest&quot;&gt;
                                {is916 ? &#39;Korrekt format (9:16)&#39; : &#39;Forkert format (Ikke 9:16)&#39;}
                            &lt;/span&gt;
                        &lt;/div&gt;
                    )}
                &lt;/div&gt;

                {/* Styringspanel */}
                &lt;div className=&quot;w-full max-w-[340px] flex flex-col gap-5 animate-fade-in&quot; style={{ animationDelay: &#39;0.2s&#39; }}&gt;
                    
                    &lt;div className=&quot;glass-card rounded-[2rem] p-6 shadow-lg text-[#E6BD71]&quot;&gt;
                        &lt;h3 className=&quot;text-2xl font-bold mb-4 flex items-center gap-3 tracking-tight&quot;&gt;
                            &lt;Icon name=&quot;help-circle&quot; size={20} /&gt; Hvad er safe zone?
                        &lt;/h3&gt;
                        &lt;p className=&quot;text-[15px] leading-relaxed font-normal&quot;&gt;
                            En safe zone på Meta, Snapchat og TikTok er det område i dit annonceformat, hvor tekst og vigtige elementer sikkert kan placeres uden at blive dækket af UI-elementer som brugernavn, CTA-knapper, likes eller captions.<br><br>
                            For at sikre korrekt visning på stories og reels skal det uploadede content være i &lt;strong&gt;9:16-format&lt;/strong&gt;.
                        &lt;/p&gt;
                    &lt;/div&gt;

                    &lt;div className=&quot;glass-card rounded-[2rem] p-6 shadow-lg text-[#E6BD71]&quot;&gt;
                        &lt;h3 className=&quot;text-2xl font-bold mb-4 flex items-center gap-3 tracking-tight&quot;&gt;
                            &lt;Icon name=&quot;smartphone&quot; size={20} /&gt; Vælg Platform
                        &lt;/h3&gt;
                        
                        &lt;div className=&quot;grid grid-cols-3 gap-2 bg-black/40 p-1.5 rounded-xl mb-4&quot;&gt;
                            {[&#39;meta&#39;, &#39;tiktok&#39;, &#39;snapchat&#39;].map((p) =&gt; (
                                &lt;button 
                                    key={p}
                                    onClick={() =&gt; setPlatform(p)}
                                    className={`py-2.5 rounded-lg font-black text-[10px] transition-all duration-300 uppercase tracking-widest ${platform === p ? &#39;bg-[#E6BD71] text-[#16322D] shadow-md scale-[1.02]&#39; : &#39;opacity-40 hover:opacity-100&#39;}`}
                                &gt;
                                    {p}
                                &lt;/button&gt;
                            ))}
                        &lt;/div&gt;

                        {platform === &#39;meta&#39; &amp;&amp; (
                            &lt;div className=&quot;flex gap-2 animate-fade-in&quot;&gt;
                                {[&#39;reels&#39;, &#39;stories&#39;].map(sub =&gt; (
                                    &lt;button 
                                        key={sub}
                                        onClick={() =&gt; setSubFormat(sub)}
                                        className={`flex-1 py-2 rounded-lg font-bold text-[9px] border transition-all duration-300 uppercase tracking-widest ${subFormat === sub ? &#39;border-[#E6BD71] text-[#E6BD71] bg-[#E6BD71]/10 shadow-[0_0_15px_rgba(230,189,113,0.1)]&#39; : &#39;border-[#E6BD71]/30 text-[#E6BD71]/60 hover:border-[#E6BD71]/50 hover:text-[#E6BD71]/90&#39;}`}
                                    &gt;
                                        {sub}
                                    &lt;/button&gt;
                                ))}
                            &lt;/div&gt;
                        )}
                    &lt;/div&gt;

                    &lt;div className=&quot;glass-card rounded-[2rem] p-6 shadow-lg text-[#E6BD71]&quot;&gt;
                        &lt;h3 className=&quot;text-2xl font-bold mb-4 flex items-center gap-3 tracking-tight&quot;&gt;
                            &lt;Icon name=&quot;info&quot; size={20} /&gt; Sådan gør du
                        &lt;/h3&gt;
                        &lt;ul className=&quot;space-y-3&quot;&gt;
                            {[
                                &quot;Upload dit medie (MP4, JPG, PNG).&quot;,
                                &quot;Vælg din ønskede platform.&quot;,
                                &quot;Hold vigtigt indhold i de klare områder.&quot;,
                                &quot;Undgå grafik i de gyldne zoner.&quot;
                            ].map((text, i) =&gt; (
                                &lt;li key={i} className=&quot;flex gap-4 items-start text-[15px] leading-snug font-normal&quot;&gt;
                                    &lt;span className=&quot;w-5 h-5 rounded-full border border-[#E6BD71]/30 flex items-center justify-center text-[9px] font-black shrink-0 text-[#E6BD71] mt-0.5&quot;&gt;
                                        {i + 1}
                                    &lt;/span&gt;
                                    {text}
                                &lt;/li&gt;
                            ))}
                        &lt;/ul&gt;
                    &lt;/div&gt;

                    {file &amp;&amp; (
                        &lt;button
                            onClick={() =&gt; fileInputRef.current?.click()}
                            className=&quot;w-full py-5 rounded-[2rem] font-black flex items-center justify-center gap-4 bg-[#E6BD71] text-[#16322D] text-[12px] uppercase tracking-[0.2em] shadow-lg hover:brightness-110 active:scale-95 transition-all duration-300 animate-fade-in&quot;
                        &gt;
                            &lt;Icon name=&quot;refresh-cw&quot; size={18} /&gt;
                            Upload ny fil
                        &lt;/button&gt;
                    )}
                &lt;/div&gt;
            &lt;/main&gt;

            {/* Footer - Opdateret: Udviklet af Frederik Nielsen er gjort en lille smule mindre (10px) */}
            &lt;footer className=&quot;w-full flex flex-col items-center gap-3 py-16 mt-auto text-center&quot;&gt;
                &lt;p className=&quot;text-[14px] font-black tracking-[0.6em] uppercase text-[#E6BD71]&quot;&gt;
                    REKOM Safe Zone Checker
                &lt;/p&gt;
                &lt;p className=&quot;text-[10px] tracking-[0.2em] font-bold text-[#E6BD71] uppercase opacity-100&quot;&gt;
                    Udviklet af: Frederik Nielsen
                &lt;/p&gt;
            &lt;/footer&gt;

            &lt;input type=&quot;file&quot; ref={fileInputRef} className=&quot;hidden&quot; accept=&quot;image/*,video/*&quot; onChange={handleFile} /&gt;
        &lt;/div&gt;
    );
}

const root = ReactDOM.createRoot(document.getElementById(&#39;root&#39;));
root.render(&lt;App /&gt;);


</script>

</body>
</html>
